<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html { font-size: 16px; }
  body { margin: 0; padding: 24px; background: hsl(var(--background)); min-height: 100vh; display: flex; align-items: center; gap: 14px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 12px; align-items: center; padding: 12px 14px; border: 1px solid hsl(var(--border)); border-radius: 14px; background: hsl(var(--card)); }
  .chip { width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0; }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .meta .name { font: 600 13px/1 var(--font-display); color: hsl(var(--foreground)); }
  .meta .tok  { font: 500 9px/1 var(--font-body); letter-spacing: 0.16em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .pri  { background: hsl(var(--primary)); }
  .sec  { background: hsl(var(--secondary)); }
  .acc  { background: hsl(var(--accent)); }
  .des  { background: hsl(var(--destructive)); }
  .pri-glow { background: hsl(var(--primary)); box-shadow: 0 0 16px hsl(var(--primary) / 0.6); }
  .acc-glow { background: hsl(var(--accent)); box-shadow: 0 0 16px hsl(var(--accent) / 0.6); }
</style>
</head>
<body>
  <div class="col">
    <div class="row">
      <div class="chip pri"></div>
      <div class="meta"><div class="name">Primary</div><div class="tok">--primary · CTA</div></div>
    </div>
    <div class="row">
      <div class="chip sec"></div>
      <div class="meta"><div class="name">Secondary</div><div class="tok">--secondary · info</div></div>
    </div>
  </div>
  <div class="col">
    <div class="row">
      <div class="chip acc"></div>
      <div class="meta"><div class="name">Accent</div><div class="tok">--accent · highlight</div></div>
    </div>
    <div class="row">
      <div class="chip des"></div>
      <div class="meta"><div class="name">Destructive</div><div class="tok">--destructive · error</div></div>
    </div>
  </div>
  <div class="col">
    <div class="row">
      <div class="chip pri-glow"></div>
      <div class="meta"><div class="name">Primary + glow</div><div class="tok">Focus halo</div></div>
    </div>
    <div class="row">
      <div class="chip acc-glow"></div>
      <div class="meta"><div class="name">Accent + glow</div><div class="tok">Indicator</div></div>
    </div>
  </div>
</body>
</html>
