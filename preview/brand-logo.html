<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html { font-size: 16px; }
  body { margin: 0; padding: 24px 30px; background: hsl(var(--background)); min-height: 100vh; display: flex; align-items: center; gap: 28px; justify-content: center; }
  .panel { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .panel .lbl { font: 500 9px/1 var(--font-body); letter-spacing: 0.2em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .panel .sub { font: 400 10px/1.3 var(--font-body); color: hsl(var(--foreground) / 0.55); text-align: center; max-width: 140px; }
  .triangle img { height: 90px; filter: invert(95%) sepia(6%) saturate(150%) hue-rotate(180deg); }
  .color img { height: 70px; }
  .word { font: 400 38px/1 var(--font-brand); letter-spacing: 0.04em; color: hsl(var(--foreground)); }
  .divider { width: 1px; align-self: stretch; background: hsl(var(--border)); }
</style>
</head>
<body>
  <div class="panel triangle">
    <img src="../assets/brand/actz-logo.webp" alt="ACTZ triangle mark">
    <div class="lbl">Mono mark</div>
    <div class="sub">Stamp + favicon. Mountain glyph nested in an A.</div>
  </div>
  <div class="divider"></div>
  <div class="panel color">
    <img src="../assets/brand/actz-logo-color.webp" alt="ACTZ color wordmark">
    <div class="lbl">Color wordmark</div>
    <div class="sub">Colorado-flag fill. Hero use only.</div>
  </div>
  <div class="divider"></div>
  <div class="panel">
    <div class="word">ACTZ</div>
    <div class="lbl">Ethnocentric wordmark</div>
    <div class="sub">Type-only — uppercase, 0.04em tracking, fonts/Ethnocentric-Regular.ttf.</div>
  </div>
</body>
</html>
