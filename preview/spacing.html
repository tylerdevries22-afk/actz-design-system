<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html { font-size: 16px; }
  body { margin: 0; padding: 24px 28px; background: hsl(var(--background)); min-height: 100vh; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
  .row { display: flex; align-items: center; gap: 12px; }
  .row .name { width: 90px; font: 700 12px/1 var(--font-display); color: hsl(var(--foreground)); }
  .row .tok  { width: 84px; font: 500 10px/1 var(--font-body); letter-spacing: 0.12em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .row .val  { width: 80px; font: 500 11px/1 var(--font-body); color: hsl(var(--foreground) / 0.7); font-variant-numeric: tabular-nums; }
  .bar { height: 16px; background: hsl(var(--co-blue) / 0.55); border-radius: 3px; box-shadow: inset 0 1px 0 hsl(var(--co-blue-light) / 0.7); }
  .b-xs { width: 0.55rem; }
  .b-s  { width: 1.1rem; }
  .b-m  { width: 1.66rem; }
  .b-l  { width: 2.2rem; }
  .b-xl { width: 3.3rem; }
  .b-2xl{ width: 5rem; }
</style>
</head>
<body>
  <div class="row"><span class="name">xs</span><span class="tok">--sp-xs</span><span class="val">0.55rem · 9px</span><div class="bar b-xs"></div></div>
  <div class="row"><span class="name">s</span><span class="tok">--sp-s</span><span class="val">1.1rem · 18px</span><div class="bar b-s"></div></div>
  <div class="row"><span class="name">m</span><span class="tok">--sp-m</span><span class="val">1.66rem · 27px</span><div class="bar b-m"></div></div>
  <div class="row"><span class="name">l</span><span class="tok">--sp-l</span><span class="val">2.2rem · 35px</span><div class="bar b-l"></div></div>
  <div class="row"><span class="name">xl</span><span class="tok">--sp-xl</span><span class="val">3.3rem · 53px</span><div class="bar b-xl"></div></div>
  <div class="row"><span class="name">2xl</span><span class="tok">--sp-2xl</span><span class="val">5rem · 80px</span><div class="bar b-2xl"></div></div>
</body>
</html>
