<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html { font-size: 16px; }
  body { margin: 0; padding: 28px 32px; background: hsl(var(--background)); min-height: 100vh; display: flex; flex-direction: column; gap: 16px; justify-content: center; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .lbl { font: 500 10px/1 var(--font-body); letter-spacing: 0.18em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  [data-lucide] { width: 16px; height: 16px; stroke-width: 2; }
  .brand-mark { width: 16px; height: 16px; display: inline-block; vertical-align: -3px; }
</style>
</head>
<body>
  <div class="row">
    <span class="lbl" style="width: 110px">Primary CTAs</span>
    <button class="btn btn-hero"><svg class="brand-mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"></path></svg> App Store</button>
    <button class="btn btn-hero-solid"><svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg> Google Play</button>
    <button class="btn btn-hero-glass">Reserve your slice</button>
  </div>
  <div class="row">
    <span class="lbl" style="width: 110px">Inline</span>
    <button class="btn btn-chip" data-active="true">Hiking</button>
    <button class="btn btn-chip">Wellness</button>
    <button class="btn btn-chip">Photography</button>
    <button class="btn btn-ghost">Skip</button>
    <button class="btn btn-ghost">Learn more →</button>
  </div>
</body>
<script>lucide.createIcons();</script>
</html>
