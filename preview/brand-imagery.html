<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html { font-size: 16px; }
  body { margin: 0; background: hsl(var(--background)); min-height: 100vh; padding: 18px; display: flex; gap: 14px; align-items: center; justify-content: center; }
  .img { position: relative; flex: 1; aspect-ratio: 4 / 3; max-width: 220px; border-radius: 18px; overflow: hidden; border: 1px solid hsl(var(--border)); }
  .img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cap { position: absolute; bottom: 8px; left: 10px; right: 10px; font: 500 9px/1.2 var(--font-body); letter-spacing: 0.16em; text-transform: uppercase; color: white; }
  .cap::before { content: ''; display: block; width: 8px; height: 8px; border-radius: 50%; background: hsl(var(--accent)); box-shadow: 0 0 8px hsl(var(--accent)); margin-bottom: 4px; }
  .grad { position: absolute; inset: auto 0 0 0; height: 60%; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); }
</style>
</head>
<body>
  <div class="img"><img src="../assets/imagery/hero-01.webp" alt=""><div class="grad"></div><div class="cap">Friends · Aspen</div></div>
  <div class="img"><img src="../assets/imagery/hero-02.webp" alt=""><div class="grad"></div><div class="cap">Sunrise · Camp</div></div>
  <div class="img"><img src="../assets/imagery/hero-05.webp" alt=""><div class="grad"></div><div class="cap">Crew · Bonfire</div></div>
  <div class="img"><img src="../assets/imagery/hero-08.webp" alt=""><div class="grad"></div><div class="cap">Maroon Bells</div></div>
</body>
</html>
