<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html { font-size: 16px; }
  body { margin: 0; padding: 36px 32px; background: hsl(var(--background)); min-height: 100vh; display: flex; gap: 24px; align-items: center; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box  { width: 96px; height: 96px; border-radius: 22px; background: hsl(var(--co-navy-soft)); border: 1px solid hsl(var(--border)); display: flex; align-items: center; justify-content: center; color: hsl(var(--foreground)); font: 600 13px/1 var(--font-display); }
  .lbl { font: 500 10px/1 var(--font-body); letter-spacing: 0.16em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .sub { font: 400 10px/1.3 var(--font-body); color: hsl(var(--foreground) / 0.55); max-width: 130px; text-align: center; }
  .card-shadow { box-shadow: 0 22px 50px -15px rgba(0,0,0,0.55); }
  .pop-shadow  { box-shadow: 0 18px 40px -10px rgba(0,0,0,0.55); }
  .glow-pri    { box-shadow: 0 0 24px 0 hsl(var(--primary) / 0.55), 0 0 56px 0 hsl(var(--primary) / 0.25); }
  .glow-sec    { box-shadow: 0 0 24px 0 hsl(var(--secondary) / 0.55), 0 0 56px 0 hsl(var(--secondary) / 0.25); }
  .glow-acc    { box-shadow: 0 0 24px 0 hsl(var(--accent) / 0.65); }
  .inset { box-shadow: inset 0 1px 1px rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); }
</style>
</head>
<body>
  <div class="item">
    <div class="box card-shadow">card</div>
    <div class="lbl">shadow-card</div>
    <div class="sub">0 22px 50px -15px · hover state</div>
  </div>
  <div class="item">
    <div class="box pop-shadow">pop</div>
    <div class="lbl">shadow-pop</div>
    <div class="sub">tooltip · badge</div>
  </div>
  <div class="item">
    <div class="box glow-pri">primary</div>
    <div class="lbl">glow-primary</div>
    <div class="sub">CTA halo · focused</div>
  </div>
  <div class="item">
    <div class="box glow-sec">secondary</div>
    <div class="lbl">glow-secondary</div>
    <div class="sub">info halo</div>
  </div>
  <div class="item">
    <div class="box glow-acc">accent</div>
    <div class="lbl">glow-accent</div>
    <div class="sub">indicator · live dot</div>
  </div>
  <div class="item">
    <div class="box inset">inset</div>
    <div class="lbl">inset-hi</div>
    <div class="sub">on every glass surface</div>
  </div>
</body>
</html>
